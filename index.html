  // ── SECTION 2: POSITION MOVEMENT ─────────────────
  if(g&&g.pages.length){

    posPages.sort(function(a,b){return posSo==='gain'?(b.pp-b.lp)-(a.pp-a.lp):posSo==='loss'?(a.pp-a.lp)-(b.pp-b.lp):posSo==='clicks'?b.lc-a.lc:posSo==='impr'?b.li-a.li:a.lp-b.lp;});
    var showPos=posPages.slice(0,40);

  // ── SECTION 3: GA4 ────────────────────────────────

    var ga4Rows=a.rows.filter(function(r){
      if(ga4Q&&r.page.toLowerCase().indexOf(ga4Q)<0)return false;

    showGA4.forEach(function(r,i){

      if(a.hasComparison){var vd=r.views-( r.viewsPrev||0);sf(6.5,false,vd>0?GRN:vd<0?RED:MID);doc.text(fmt(r.viewsPrev||0),mg+120,y,{align:'right'});}
      sf(6.5,false,r.keyEvents>=50?PINK:WHITE);doc.text(fmt(r.keyEvents),mg+132,y,{align:'right'});
      var cvCol=cv>=25?GRN:cv>=12?PINK:cv<3&&r.views>50?RED:WHITE;
      sf(6.5,true,cvCol);doc.text(cv.toFixed(1)+'%',mg+148,y,{align:'right'});
      sf(6.5,false,r.engTime<5&&r.views>30?RED:MID);doc.text(Math.round(r.engTime)+'s',pw-mg-2,y,{align:'right'});
      y+=lh;
    });
    if(ga4Rows.length>50){sf(6,false,MID);doc.text('+ '+(ga4Rows.length-50)+' more pages',mg,y);y+=lh;}
    y+=4;
  }

  // ── SECTION 4: KEYWORDS ──────────────────────────
  if(g&&g.queries.length){
    np();
    // Top impressions
    secHead('KEYWORDS — TOP IMPRESSIONS');
    var topQ=g.queries.slice().sort(function(a,b){return b.li-a.li;}).slice(0,25);
    doc.setFillColor(PINK[0],PINK[1],PINK[2]);doc.rect(mg,y-3.5,pw-mg*2,5.5,'F');
    sf(6,true,BLACK);
    doc.text('Query',mg+2,y);doc.text('Impressions',mg+95,y,{align:'right'});doc.text('Clicks',mg+113,y,{align:'right'});doc.text('CTR',mg+127,y,{align:'right'});doc.text('Position',mg+143,y,{align:'right'});doc.text('Change',pw-mg-2,y,{align:'right'});
    y+=lh;
    topQ.forEach(function(q,i){
      cp(6);var d=q.pp>0&&q.lp>0?q.pp-q.lp:null;
      doc.setFillColor(i%2===0?22:28,i%2===0?22:28,i%2===0?22:28);doc.rect(mg,y-3.5,pw-mg*2,5.5,'F');
      sf(6.5,false,WHITE);doc.text(q.key.slice(0,55),mg+2,y);
      sf(6.5,false,MID);doc.text(q.li.toLocaleString(),mg+95,y,{align:'right'});
      sf(6.5,false,q.lc>0?WHITE:MID);doc.text(String(q.lc),mg+113,y,{align:'right'});
      sf(6.5,false,MID);doc.text(q.lctr,mg+127,y,{align:'right'});
      var posCol=q.lp>0&&q.lp<=3?PINK:q.lp<=10?GRN:MID;
      sf(6.5,false,posCol);doc.text(q.lp>0?q.lp.toFixed(1):'\u2014',mg+143,y,{align:'right'});
      if(d!=null){sf(6.5,true,d>0?GRN:d<0?RED:MID);doc.text((d>0?'+':'')+d.toFixed(1),pw-mg-2,y,{align:'right'});}
      y+=lh;
    });
    y+=6;

    // Opportunities
    var opps=g.queries.filter(function(q){return q.li>200&&q.lp>10&&q.lp<35&&q.lc<q.li*0.02;}).sort(function(a,b){return b.li-a.li;}).slice(0,20);
    if(opps.length){
      cp(20);secHead('KEYWORD OPPORTUNITIES (pos 10\u201335, high impressions, low CTR)');
      doc.setFillColor(PINK[0],PINK[1],PINK[2]);doc.rect(mg,y-3.5,pw-mg*2,5.5,'F');
      sf(6,true,BLACK);
      doc.text('Query',mg+2,y);doc.text('Impressions',mg+95,y,{align:'right'});doc.text('Position',mg+115,y,{align:'right'});doc.text('Change',mg+133,y,{align:'right'});doc.text('Clicks',mg+148,y,{align:'right'});doc.text('CTR',pw-mg-2,y,{align:'right'});
      y+=lh;
      opps.forEach(function(q,i){
        cp(6);var d=q.pp>0&&q.lp>0?q.pp-q.lp:null;
        doc.setFillColor(i%2===0?22:28,i%2===0?22:28,i%2===0?22:28);doc.rect(mg,y-3.5,pw-mg*2,5.5,'F');
        sf(6.5,false,WHITE);doc.text(q.key.slice(0,55),mg+2,y);
        sf(6.5,false,MID);doc.text(q.li.toLocaleString(),mg+95,y,{align:'right'});
        sf(6.5,false,AMBER);doc.text(q.lp>0?q.lp.toFixed(1):'\u2014',mg+115,y,{align:'right'});
        if(d!=null){sf(6.5,true,d>0?GRN:d<0?RED:MID);doc.text((d>0?'+':'')+d.toFixed(1),mg+133,y,{align:'right'});}
        sf(6.5,false,WHITE);doc.text(String(q.lc),mg+148,y,{align:'right'});
        sf(6.5,false,MID);doc.text(q.lctr,pw-mg-2,y,{align:'right'});
        y+=lh;
      });
      y+=4;
    }

    // Click gainers
    var gainers=g.queries.filter(function(q){return q.lc>q.pc&&q.lc>=2;}).sort(function(a,b){return(b.lc-b.pc)-(a.lc-a.pc);}).slice(0,15);
    if(gainers.length){
      cp(20);secHead('CLICK GAINERS');
      doc.setFillColor(PINK[0],PINK[1],PINK[2]);doc.rect(mg,y-3.5,pw-mg*2,5.5,'F');
      sf(6,true,BLACK);doc.text('Query',mg+2,y);doc.text('Prev clicks',mg+100,y,{align:'right'});doc.text('Curr clicks',mg+122,y,{align:'right'});doc.text('Gain',mg+140,y,{align:'right'});doc.text('Impressions',pw-mg-2,y,{align:'right'});
      y+=lh;
      gainers.forEach(function(q,i){
        cp(6);doc.setFillColor(i%2===0?22:28,i%2===0?22:28,i%2===0?22:28);doc.rect(mg,y-3.5,pw-mg*2,5.5,'F');
        sf(6.5,false,WHITE);doc.text(q.key.slice(0,55),mg+2,y);
        sf(6.5,false,MID);doc.text(String(q.pc),mg+100,y,{align:'right'});
        sf(6.5,false,WHITE);doc.text(String(q.lc),mg+122,y,{align:'right'});
        sf(6.5,true,GRN);doc.text('+'+(q.lc-q.pc),mg+140,y,{align:'right'});
        sf(6.5,false,MID);doc.text(q.li.toLocaleString(),pw-mg-2,y,{align:'right'});
        y+=lh;
      });
      y+=4;
    }
  }

  // ── SECTION 5: AI TAKEAWAYS ───────────────────────
  if(S.ta){
    np();secHead('AI TAKEAWAYS');
    var sSections=S.ta.split(/^## /m).filter(Boolean);
    var sColors={'Executive summary':PINK,'What is working':GRN,'Concerns':RED,'Actions for the team':[100,100,100],'Keyword opportunities':[80,80,80]};
    sSections.forEach(function(sec){
      var parts=sec.split('\n'),title=parts[0].trim(),body=parts.slice(1).join('\n').trim();
      var col=sColors[title]||MID;
      cp(18);
      doc.setFillColor(GREY[0],GREY[1],GREY[2]);doc.roundedRect(mg,y,pw-mg*2,9,1,1,'F');
      doc.setFillColor(col[0],col[1],col[2]);doc.roundedRect(mg,y,2,9,1,1,'F');
      sf(7.5,true,col);doc.text(title,mg+5,y+6);
      y+=11;
      var wrapped=doc.splitTextToSize(body,pw-mg*2-4);
      var maxL=Math.min(wrapped.length,8);
      sf(6.5,false,[180,180,180]);
      for(var li3=0;li3<maxL;li3++){cp(lh+1);doc.text(wrapped[li3],mg+3,y);y+=lh;}
      y+=4;
    });
  }

  // ── CHARTS from canvas ────────────────────────────
  var canvases=document.querySelectorAll('canvas');
  if(canvases.length>0){
    np();secHead('CHARTS');
    for(var ci=0;ci<canvases.length;ci++){
      try{
        var cv2=canvases[ci];
        if(cv2.width<10||cv2.height<10)continue;
        var imgD=cv2.toDataURL('image/png',0.95);
        var ratio2=cv2.width/cv2.height;
        var iW=pw-mg*2,iH=iW/ratio2;
        if(iH>90)iH=90,iW=iH*ratio2;
        cp(iH+6);
        doc.setFillColor(GREY[0],GREY[1],GREY[2]);doc.roundedRect(mg,y,iW,iH,1.5,1.5,'F');
        doc.addImage(imgD,'PNG',mg,y,iW,iH);
        y+=iH+6;
      }catch(e){}
    }
  }

  // ── FOOTER ───────────────────────────────────────
  var nPages=doc.internal.getNumberOfPages();
  for(var pg=1;pg<=nPages;pg++){
    doc.setPage(pg);
    doc.setFillColor(20,20,20);doc.rect(0,ph-8,pw,8,'F');
    sf(5.5,false,[60,60,60]);
    doc.text('casinos.com SEO Dashboard \u2014 Confidential',mg,ph-3);
    doc.text('Page '+pg+' of '+nPages,pw-mg,ph-3,{align:'right'});
  }

  var fname='casinos-seo-'+new Date().toISOString().split('T')[0]+'.pdf';
  doc.save(fname);
  if(btn){btn.innerHTML='<svg viewBox="0 0 16 16" style="width:13px;height:13px;fill:currentColor"><path d="M8 12l-4-4h2.5V4h3v4H12L8 12zm-5 2h10v1.5H3V14z"/></svg> Download PDF';btn.disabled=false;}
}
window.downloadPDF=downloadPDF;

/* MAIN */
function render(){
  if(!S.gsc&&!S.ga4){renderUpload();return;}
  var TABS=[{id:'overview',l:'Overview'},{id:'positions',l:'Positions'},{id:'ga4',l:'GA4'},{id:'keywords',l:'Keywords'},{id:'takeaways',l:'AI Takeaways'}];
  ROOT.innerHTML='<div class="topbar"><div class="lm">'+STAR+'</div><div><div class="ln">casinos.com</div><span class="ls">SEO Dashboard</span></div>'+((S.gsc||S.ga4)?'<div class="dp"><span class="dd"></span>'+esc(dateBadge())+'</div>':'')+(S.gsc&&S.gsc.hasComparison?'<span class="cmp-pill">GSC comparison</span>':'')+(S.ga4&&S.ga4.hasComparison?'<span class="cmp-pill">GA4 comparison</span>':'')+'<div style="flex:1"></div>'
    +(S.gsc||S.ga4?'<button class="pdf-btn" id="pdfBtn" onclick="downloadPDF()"><svg viewBox="0 0 16 16" style="width:13px;height:13px;fill:currentColor"><path d="M8 12l-4-4h2.5V4h3v4H12L8 12zm-5 2h10v1.5H3V14z"/></svg>Download PDF</button>':'')
    +'<button id="backBtn" style="font-size:11px;margin-left:6px">\u27f5 Upload files</button></div>'+'<div class="tabnav">'+TABS.map(function(t){return'<button class="tb'+(S.tab===t.id?' on':'')+'" data-tab="'+t.id+'">'+t.l+'</button>';}).join('')+'</div>'+'<div class="main" id="tc"></div>';
  document.querySelectorAll('[data-tab]').forEach(function(btn){btn.onclick=function(){S.tab=btn.getAttribute('data-tab');render();};});
  var bb=$('backBtn');if(bb)bb.onclick=function(){S.gsc=null;S.ga4=null;S.files=[];S.ta=null;S.market='all';renderUpload();};
  var ms=$('mktSelect');if(ms)ms.onchange=function(){
    var newMkt=ms.value;
    S.market=newMkt;S.ta=null;
    // If data was loaded live, reload GA4 for the new market's property
    var isLive=S.files.length>0&&S.files[0].type==='LIVE';
    if(isLive&&N8N_WEBHOOK_URL&&N8N_WEBHOOK_URL!=='YOUR_N8N_WEBHOOK_URL_HERE'){
      var statusEl=$('liveStatus');
      render(); // render first with GSC filtered
      // Then reload GA4 for this market
      var today=new Date();
      var fmt2=function(d){return d.toISOString().split('T')[0];};
      var end2=fmt2(today),start2=fmt2(new Date(today.getTime()-28*86400000));
      var pEnd2=fmt2(new Date(today.getTime()-29*86400000)),pStart2=fmt2(new Date(today.getTime()-56*86400000));
      fetch(N8N_WEBHOOK_URL,{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({site:'https://www.casinos.com/',market:newMkt.toLowerCase(),startDate:start2,endDate:end2,prevStartDate:pStart2,prevEndDate:pEnd2})})
      .then(function(r){return r.json();})
      .then(function(d){
        if(d.ga4){S.ga4=d.ga4;}
        render();
      }).catch(function(){});
    } else {
      render();
    }
  };
  doTab();
}
function doTab(){if(S.tab==='overview')tabOverview();else if(S.tab==='positions')tabPositions();else if(S.tab==='ga4')tabGA4();else if(S.tab==='keywords')tabKeywords();else if(S.tab==='takeaways')tabTakeaways();}

renderUpload();
</script>
