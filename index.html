var GEO_MKTS=['ca','uk','ie','it','nz','row'];

function getGA4FilteredRows(allRows, mktKey) {
  if(mktKey === 'all') return allRows;

  // GX / global = pages with NO geo prefix in path
  if(mktKey === 'gx' || mktKey === 'global' || (MARKETS[mktKey] && MARKETS[mktKey].gx)) {
    return allRows.filter(function(r){ return isGXPage(r.page); });
  }

  // Specific geo with a known prefix (us, ca, uk, ie, it, nz)
  var m = MARKETS[mktKey];
  if(m && m.prefix) {
    return allRows.filter(function(r){
      var p = (r.page||'').toLowerCase().replace(/^https?:\/\/[^/]+/,'');
      // exact root match like /us or /ca, OR starts with /us/ or /ca/
      return p === m.prefix.slice(0,-1) || p.indexOf(m.prefix) === 0;
    });
  }

  // For geo-specific live data properties loaded by n8n (the data is already geo-scoped)
  // Check if the rows have geo paths - if yes, filter; if no, assume all data is for this market
  if(GEO_MKTS.indexOf(mktKey) >= 0) {
    var hasPrefixedRows = allRows.some(function(r){
      return KNOWN_PREFIXES.some(function(pfx){ return (r.page||'').indexOf(pfx) >= 0; });
    });
    if(hasPrefixedRows) {
      return allRows.filter(function(r){ return matchMarket(r.page, mktKey); });
    }
    // No geo prefixes in data = geo-specific property, show everything
    return allRows;
  }

  return allRows;
}

      var cvp=(r.viewsPrev>0?(r.keyEventsPrev||0)/r.viewsPrev*100:0).toFixed(1);
      var pg=r.page.replace(/^https?:\/\/[^/]+/,'');
      return pg+'|'+r.views+'v|'+r.keyEvents+' exits|'+cv+'% conv'+(a.hasComparison?' (was '+cvp+'%)':'');
    }).join('\n')

    +thClick('eng','Eng. Time')
    +'</tr>';

  var tbodyRows=src.slice(0,150).map(function(r){
    var cv=r.views>0?r.keyEvents/r.views*100:0;
    var vD=hasCmp&&r.viewsPrev>0?r.views-r.viewsPrev:null;
    var kD=hasCmp&&r.keyEventsPrev>0?r.keyEvents-r.keyEventsPrev:null;
    var pt=getPageType(r.page);
    var badge=ptBadge(pt);
    var pageDisplay=r.page.replace(/^https?:\/\/[^/]+/,'');
    if(!pageDisplay||pageDisplay==='/')pageDisplay=r.page;
    var cvCol=cv===0?'#444':cv>=20?'#27AE60':cv>=10?'#D4882A':'#888';
    var cvLabel=cv===0?'—':cv.toFixed(2)+'%';
    var cvWeight=cv>=20||cv===0?'700':'400';
    var row='<tr>'
      +'<td>'+badge+'</td>'
      +'<td class="url-cell" style="font-family:monospace;font-size:10px;color:#aaa" title="'+esc(r.page)+'">'+esc(pageDisplay)+'</td>'
      +'<td class="r">'+fmt(r.views)+'</td>';
    if(hasCmp){
      var vdStr=vD!==null?(vD>=0?'+':'')+fmt(vD):'\u2014';
      var vdCol=vD!==null?dcol(vD):'#555';
      row+='<td class="r" style="color:#555">'+fmt(r.viewsPrev||0)+'</td>'
        +'<td class="r" style="color:'+vdCol+';font-weight:'+(vD!==null?'700':'400')+'">'+vdStr+'</td>';
    }
    var keCol=r.keyEvents>=50?'#E91E8C':r.keyEvents>0?'#F0F0F0':'#444';
    row+='<td class="r" style="color:'+keCol+';font-weight:'+(r.keyEvents>=50?'700':'400')+'">'+fmt(r.keyEvents)+'</td>';
    if(hasCmp){
      var kdStr=kD!==null?(kD>=0?'+':'')+fmt(kD):'\u2014';
      var kdCol=kD!==null?dcol(kD):'#555';
      row+='<td class="r" style="color:#555">'+fmt(r.keyEventsPrev||0)+'</td>'
        +'<td class="r" style="color:'+kdCol+';font-weight:'+(kD!==null?'700':'400')+'">'+kdStr+'</td>';
    }
    row+='<td class="r" style="color:'+cvCol+';font-weight:'+cvWeight+'">'+cvLabel+'</td>'
      +'<td class="r" style="color:'+(r.engTime<10&&r.views>30?'#E05C3A':'#555')+'">'+fmtTime(r.engTime)+'</td>'
      +'</tr>';
    return row;
  }).join('');

  var convLegend='<div style="display:flex;gap:16px;margin-bottom:8px;flex-wrap:wrap;font-size:10px">'
    +'<span style="color:#888;font-weight:700">Conv.% key:</span>'
    +'<span style="color:#27AE60">\u25cf \u226520% Good</span>'
    +'<span style="color:#D4882A">\u25cf 10\u201319% Average</span>'
    +'<span style="color:#888">\u25cf 1\u20139% Low</span>'
    +'<span style="color:#444">\u25cf 0% No conversions</span>'
    +'</div>';
  gt.innerHTML=convLegend+'<div class="tbl"><table><thead>'+thead+'</thead><tbody>'+tbodyRows+'</tbody></table></div>';

  // Update chart — exit clicks by top pages
  var top=src.slice(0,10);
  var ds=[{label:'Exit Click Goal',data:top.map(function(r){return r.keyEvents;}),backgroundColor:'#E91E8C',borderRadius:3}];
  if(hasCmp) ds.unshift({label:'Exit Click Goal (prev)',data:top.map(function(r){return r.keyEventsPrev||0;}),backgroundColor:'rgba(255,255,255,.1)',borderRadius:3});
  barChart('cG4',top.map(function(r){
    var p=r.page.replace(/^\/(us|ca|uk|ie|it|nz)\//,'').replace(/-/g,' ');
    return p.length>22?p.slice(0,20)+'\u2026':p;
  }),ds);
}

  var searchVal=(S.kwSearch||'').toLowerCase();

  // Tab sets

    losers:qs.filter(function(q){return q.lc<q.pc&&q.pc>=2;}).sort(function(a,b){return(a.lc-a.pc)-(b.lc-b.pc);}).slice(0,100),
    opps:qs.filter(function(q){return q.li>100&&q.lp>10&&q.lp<=20&&q.lctr&&parseFloat(q.lctr)<3;}).sort(function(a,b){return b.li-a.li;}).slice(0,100),
    page1:qs.filter(function(q){return q.lp>=1&&q.lp<=10;}).sort(function(a,b){return a.lp-b.lp;}).slice(0,100),

    +(aioSet.size>0?' \u00b7 <span style="color:#9B59B6">\uD83E\uDD16 '+aioSet.size+' queries in AI Overviews</span>':'')

    +'<input id="kwSearch" type="text" placeholder="Search keywords or page URLs\u2026" value="'+esc(S.kwSearch||'')+'" style="flex:1;min-width:200px;height:32px">'
    +((searchVal||activeUrl)?'<button id="kwClearAll" style="font-size:11px;color:#888;border-color:#444;padding:4px 10px">Clear filters</button>':'')
    +'</div>';

  // Active URL indicator
  if(activeUrl){
    html+='<div class="kw-url-filter"><span>Filtered to URL:</span><code>'+esc(activeUrl.replace(/^https?:\/\/[^/]+/,''))+'</code><button id="kwClearUrl">\u2715</button></div>';

    html+='<button class="tb'+(S.kw===t.id?' on':'')+'" data-kw="'+t.id+'" style="font-size:11px'+(isAio?';color:#9B59B6':'')+'">'

  html+='</div>';

    html+='<div class="empty">No keywords match your filters'+(searchVal?' for "'+esc(searchVal)+'"':'')+'</div>';

  // Table
  var hasCmp=g.hasComparison&&S.compareMode;
  html+='<div id="kwTbl" class="tbl"><table>';
  html+='<thead><tr>';
  html+='<th>URL'+(hasPageData?' <span style="color:#444;font-weight:400;text-transform:none;font-size:8px">(click to filter)</span>':'')+'</th>';
  html+='<th>Keyword</th>';
  html+='<th class="r">Impr.</th>';
  html+='<th class="r">Clicks</th>';
  html+='<th class="r">CTR</th>';

  html+='<th class="r">AIO</th>';
  html+='</tr></thead><tbody>';

  cur.forEach(function(q){
    var d=q.pp>0&&q.lp>0?q.pp-q.lp:null;
    var pageRaw=q.page||'';
    var pageDisplay=pageRaw.replace(/^https?:\/\/[^/]+/,'');
    if(!pageDisplay)pageDisplay=pageRaw;
    var isActive=activeUrl&&q.page===activeUrl;
    var posCol=q.lp>0&&q.lp<=3?'#E91E8C':q.lp<=10?'#27AE60':'#888';
    var clicksCol=q.lc>q.pc?'#27AE60':q.lc>0?'#F0F0F0':'#555';
    var inAIO=aioSet.has(q.key.toLowerCase());
    // Flag low CTR queries in AI Overviews — potential click cannibalization

    html+='<tr'+(aioCannibal?' style="background:rgba(155,89,182,.07)"':'')+'>';

    if(hasPageData&&pageRaw){
      html+='<td class="url-cell">'
        +'<button class="url-btn'+(isActive?' active':'')+'" data-kwurl="'+esc(pageRaw)+'" title="'+esc(pageDisplay)+'">'
        +esc(pageDisplay.length>36?pageDisplay.slice(0,34)+'\u2026':pageDisplay)
        +'</button></td>';
    } else {
      html+='<td style="color:#444;font-size:10px">\u2014</td>';
    }

    html+='<td style="font-family:monospace;font-size:10.5px;color:#F0F0F0;max-width:280px;overflow:hidden;text-overflow:ellipsis" title="'+esc(q.key)+'">'+esc(q.key)+'</td>';
    html+='<td class="r" style="color:#888">'+q.li.toLocaleString()+'</td>';
    html+='<td class="r" style="color:'+clicksCol+'">'+q.lc+'</td>';
    html+='<td class="r" style="color:'+(aioCannibal?'#E05C3A':'#555')+'"'+(aioCannibal?' title="Low CTR — AI Overview may be intercepting clicks"':'')+'>'+esc(q.lctr)+'</td>';
    html+='<td class="r" style="color:'+posCol+';font-weight:'+(q.lp>0&&q.lp<=3?'700':'400')+'">'+(q.lp>0?q.lp.toFixed(1):'\u2014')+'</td>';
    if(hasCmp){
      var dStr=d!==null?(d>0?'+':'')+d.toFixed(1):'\u2014';
      html+='<td class="r" style="color:'+(d!==null?dcol(d):'#444')+';font-weight:'+(d!==null?'700':'400')+'">'+dStr+'</td>';
    }
    html+='<td class="r">'+(inAIO?'<span style="font-size:11px" title="Appears in AI Overview">\uD83E\uDD16</span>':'<span style="color:#333">\u2014</span>')+'</td>';
    html+='</tr>';
  });

  html+='</tbody></table></div>';
  // CSV export button
  html+='<div style="text-align:right;margin-top:8px">'+csvBtn('kwTbl','gsc-keywords-'+S.kw)+'</div>';
  $('tc').innerHTML=html;
  _bindKwEvents();
}

   CONTENT DECAY TAB
   ============================================================ */
function tabDecay(){
  var g=S.gsc,a=S.ga4;
  if(!g||!g.hasComparison){
    $('tc').innerHTML='<div class="empty" style="padding:60px 20px">'
      +'<div style="font-size:32px;margin-bottom:10px">\uD83D\uDCC9</div>'
      +'<div style="font-size:13px;color:#888;margin-bottom:6px">Comparison data required</div>'
      +'<div style="font-size:11px;color:#555">Content Decay needs GSC data with a comparison period.<br>Make sure Compare is ON and load live data.</div>'
      +'</div>';
    return;
  }

  var mktKey=S.market||'all';
  var mktLabel=MARKETS[mktKey]?MARKETS[mktKey].label:mktKey;
  var minClicks=S.decayMinClicks||20;
  var minPct=S.decayMinPct||15;
  var ptFilter=S.decayPageType||'all';

  // Build decay dataset from GSC pages
  var allPages=g.pages.filter(function(p){
    if(!matchMarket(p.key,mktKey))return false;
    if(ptFilter!=='all'&&getPageType(p.key)!==ptFilter)return false;
    return p.pc>=minClicks && p.lc<p.pc; // had traffic before, lost clicks
  }).map(function(p){
    var clickDrop=p.pc-p.lc;
    var clickDropPct=p.pc>0?((p.pc-p.lc)/p.pc*100):0;
    var imprDrop=p.pi-p.li;
    var imprDropPct=p.pi>0?((p.pi-p.li)/p.pi*100):0;
    var posDrop=p.lp>0&&p.pp>0?p.lp-p.pp:0; // positive = dropped in rankings

    // Classify decay cause
    var cause='unknown';
    if(posDrop>3&&imprDropPct>10)      cause='ranking_loss';
    else if(posDrop>2)                  cause='ranking_drop';
    else if(imprDropPct>15)             cause='visibility_loss';
    else if(clickDropPct>20&&posDrop<1) cause='ctr_drop';
    else                                cause='traffic_loss';

    // Severity
    var severity=clickDropPct>=50?'critical':clickDropPct>=25?'high':clickDropPct>=minPct?'medium':'low';

    // GA4 data if available
    var ga4Row=a?a.rows.find(function(r){
      var rp=r.page.replace(/^https?:\/\/[^/]+/,'').replace(/\/$/,'');
      var pp=p.key.replace(/^https?:\/\/[^/]+/,'').replace(/\/$/,'');
      return rp===pp;
    }):null;

    return{
      key:p.key,
      pt:getPageType(p.key),
      lc:p.lc,pc:p.pc,
      li:p.li,pi:p.pi,
      lp:p.lp,pp:p.pp,
      clickDrop:clickDrop,
      clickDropPct:clickDropPct,
      imprDrop:imprDrop,
      imprDropPct:imprDropPct,
      posDrop:posDrop,
      cause:cause,
      severity:severity,
      views:ga4Row?ga4Row.views:null,
      viewsPrev:ga4Row?ga4Row.viewsPrev:null,
      keyEvents:ga4Row?ga4Row.keyEvents:null
    };
  }).filter(function(p){return p.clickDropPct>=minPct;})
    .sort(function(a,b){return b.clickDrop-a.clickDrop;});

  var critical=allPages.filter(function(p){return p.severity==='critical';});
  var high=allPages.filter(function(p){return p.severity==='high';});
  var totalLostClicks=allPages.reduce(function(s,p){return s+p.clickDrop;},0);
  var dr=g.ds?drange(g.ds,g.de):g.dateRange;

  var CAUSES={
    ranking_loss: {label:'Ranking loss',     color:'#E05C3A', icon:'\u2193\uFE0F',  tip:'Position dropped significantly — content may need refreshing or backlinks'},
    ranking_drop: {label:'Position drop',    color:'#D4882A', icon:'\uD83D\uDCC9',  tip:'Moderate position decline — monitor and consider content update'},
    visibility_loss:{label:'Visibility loss',color:'#9B59B6', icon:'\uD83D\uDC41',  tip:'Impressions dropped — may have been deindexed or suppressed'},
    ctr_drop:     {label:'CTR decline',      color:'#5DADE2', icon:'\uD83D\uDCCA',  tip:'Position held but fewer clicks — title/meta may need optimising'},
    traffic_loss: {label:'Traffic loss',     color:'#888',    icon:'\uD83D\uDCCA',  tip:'General traffic decline across clicks and impressions'},
    unknown:      {label:'Decline',          color:'#555',    icon:'\u2193',         tip:'Traffic declining'}
  };
  var SEV={
    critical:{label:'Critical',color:'#E05C3A',bg:'rgba(224,92,58,.12)'},
    high:    {label:'High',    color:'#D4882A',bg:'rgba(212,136,42,.1)'},
    medium:  {label:'Medium',  color:'#888',   bg:'rgba(136,136,136,.08)'},
    low:     {label:'Low',     color:'#555',   bg:'rgba(85,85,85,.06)'}
  };

  var html='';

  // Summary cards
  html+='<div class="g4" style="margin-bottom:14px">'
    +mkMC('\uD83D\uDCC9 Decaying Pages',String(allPages.length),'Lost \u2265'+minPct+'% clicks vs prev','#E05C3A',dr)
    +mkMC('Critical (>50% drop)',String(critical.length),critical.length>0?'Immediate attention needed':'All clear',critical.length>0?'#E05C3A':'#27AE60')
    +mkMC('High (25-50% drop)',String(high.length),high.length>0?'Action recommended':'','#D4882A')
    +mkMC('Est. Lost Clicks',fmt(totalLostClicks),'vs previous period','#E05C3A')
    +'</div>';

  // How it works — legend
  html+='<details style="margin-bottom:14px">'
    +'<summary style="font-size:11px;color:#555;cursor:pointer;padding:10px 14px;background:var(--bg2);border:1px solid #222;border-radius:8px;list-style:none;display:flex;align-items:center;gap:6px">'
    +'<span style="color:#444">\u25b6</span> <strong style="color:#888">How decay is detected &amp; classified</strong> <span style="color:#444;margin-left:auto;font-size:10px">click to expand</span>'
    +'</summary>'
    +'<div style="background:var(--bg2);border:1px solid #222;border-top:none;border-radius:0 0 8px 8px;padding:14px 16px">'

    // Detection formula
    +'<div style="margin-bottom:14px">'
    +'<div style="font-size:10px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">Detection formula</div>'
    +'<div style="font-size:11px;color:#666;line-height:1.8">'
    +'A page is flagged as decaying when it had <strong style="color:#aaa">at least '+minClicks+' clicks</strong> in the previous period '
    +'and lost <strong style="color:#aaa">'+minPct+'% or more</strong> of those clicks in the current period. '
    +'Both thresholds are adjustable using the filters above.'
    +'</div>'
    +'</div>'

    // Severity
    +'<div style="margin-bottom:14px">'
    +'<div style="font-size:10px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">Severity levels</div>'
    +'<div style="display:flex;flex-direction:column;gap:6px">'
    +[
      {sev:'Critical', color:'#E05C3A', formula:'>50% click drop', desc:'More than half of previous clicks lost. Needs urgent investigation.'},
      {sev:'High',     color:'#D4882A', formula:'25–50% click drop', desc:'Significant decline. Should be actioned within the week.'},
      {sev:'Medium',   color:'#888',    formula:'15–24% click drop', desc:'Noticeable decline. Worth monitoring and scheduling a review.'},
      {sev:'Low',      color:'#555',    formula:'Below medium threshold', desc:'Minor decline within normal variance range.'}
    ].map(function(s){
      return'<div style="display:flex;align-items:flex-start;gap:10px">'
        +'<span style="font-size:9px;font-weight:700;color:'+s.color+';border:1px solid '+s.color+';border-radius:4px;padding:1px 7px;white-space:nowrap;margin-top:1px">'+s.sev+'</span>'
        +'<div><span style="font-size:11px;color:#aaa;font-weight:600">'+s.formula+'</span>'
        +'<span style="font-size:11px;color:#555"> — '+s.desc+'</span></div>'
        +'</div>';
    }).join('')
    +'</div></div>'

    // Cause classification
    +'<div>'
    +'<div style="font-size:10px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">Cause classification</div>'
    +'<div style="font-size:10px;color:#555;margin-bottom:8px">Each decaying page is automatically diagnosed based on the combination of click change, impression change, and position change vs the previous period.</div>'
    +'<div style="display:flex;flex-direction:column;gap:8px">'
    +[
      {key:'ranking_loss', label:'Ranking loss',    color:'#E05C3A', formula:'Position dropped >3 places AND impressions fell >10%',    action:'Content may be outdated, lost backlinks, or hit by an algorithm update. Refresh content and audit links.'},
      {key:'ranking_drop', label:'Position drop',   color:'#D4882A', formula:'Position dropped 2–3 places',                              action:'Moderate ranking slide. Update content, improve internal linking, check for technical issues.'},
      {key:'visibility_loss',label:'Visibility loss',color:'#9B59B6',formula:'Impressions dropped >15% but position change is small',    action:'Page may have been deindexed, penalised, or suppressed in SERPs. Check GSC Coverage and any manual actions.'},
      {key:'ctr_drop',    label:'CTR decline',      color:'#5DADE2', formula:'Position held (change <1) but CTR dropped >20%',          action:'Rankings are fine but fewer people click. Rewrite the title tag and meta description to be more compelling.'},
      {key:'traffic_loss',label:'Traffic loss',     color:'#888',    formula:'General decline not matching above patterns',              action:'Broad traffic drop. Compare against site-wide trends to rule out seasonal patterns or algorithm shifts.'}
    ].map(function(cause){
      return'<div style="background:rgba(255,255,255,.02);border:1px solid #222;border-radius:7px;padding:10px 12px">'
        +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:5px">'
        +'<span style="font-size:11px;color:'+cause.color+';font-weight:700">'+cause.label+'</span>'
        +'</div>'
        +'<div style="font-size:10px;color:#555;margin-bottom:4px">'
        +'<strong style="color:#666">Triggered when: </strong>'+esc(cause.formula)
        +'</div>'
        +'<div style="font-size:10px;color:#555">'
        +'<strong style="color:#666">What to do: </strong>'+esc(cause.action)
        +'</div>'
        +'</div>';
    }).join('')
    +'</div>'
    +'</div>'
    +'</div>'

window.runDecayReport=function(){
  var btn=$('decayReportBtn');
  if(btn){btn.disabled=true;btn.textContent='Analysing\u2026';}

  var g=S.gsc,a=S.ga4,mktKey=S.market||'all';
  var mktLabel=MARKETS[mktKey]?MARKETS[mktKey].label:mktKey;
  var minClicks=S.decayMinClicks||20;
  var minPct=S.decayMinPct||15;
  var isAllMarkets=mktKey==='all'||mktKey==='gx'||mktKey==='global';

  var isUS=mktKey==='us';

  var pages=g.pages.filter(function(p){
    if(!matchMarket(p.key,mktKey))return false;
    if(isUS&&isBlacklisted(p.key))return false; // exclude blacklisted from decay analysis
    return p.pc>=minClicks&&p.lc<p.pc&&((p.pc-p.lc)/p.pc*100)>=minPct;
  }).map(function(p){
    var pct=p.pc>0?(p.pc-p.lc)/p.pc*100:0;
    var posDrop=p.lp>0&&p.pp>0?p.lp-p.pp:0;
    // Detect which market this page belongs to
    var pageMkt='global';
    var slug2=p.key.replace(/^https?:\/\/[^/]+/,'');
    Object.keys(MARKETS).forEach(function(mk){
      if(mk==='all'||mk==='gx'||mk==='global')return;
      if(matchMarket(p.key,mk))pageMkt=MARKETS[mk].label;
    });
    return{
      key:slug2,type:getPageType(p.key),market:pageMkt,
      clickDrop:p.pc-p.lc,pct:Math.round(pct),
      prev:p.pc,curr:p.lc,
      posDrop:posDrop.toFixed(1),
      imprPct:p.pi>0?Math.round((p.pi-p.li)/p.pi*100):0
    };
  }).sort(function(a,b){return b.pct-a.pct||b.clickDrop-a.clickDrop;}).slice(0,25);

  var critical=pages.filter(function(p){return p.pct>=50;});
  var high=pages.filter(function(p){return p.pct>=25&&p.pct<50;});
  var medium=pages.filter(function(p){return p.pct<25;});

  // Group by market for the "all markets" view
  var mktGroups={};
  if(isAllMarkets){
    pages.forEach(function(p){
      if(!mktGroups[p.market])mktGroups[p.market]=[];
      mktGroups[p.market].push(p);
    });
  }

  var prompt='You are a senior SEO analyst for casinos.com. Analyse this content decay data and provide a recovery plan.\n\n'
    +'MARKET SCOPE: '+(isAllMarkets?'ALL MARKETS — group analysis BY MARKET':mktLabel+' ONLY — all analysis must be specific to '+mktLabel)+'\n'
    +(isUS?'PRIORITY: Focus on BOFU and State pages first — these are the revenue drivers.\n':'')
    +'PERIOD: '+(g.ds?drange(g.ds,g.de):g.dateRange)+' vs previous period\n\n';

  if(isAllMarkets&&Object.keys(mktGroups).length>0){
    prompt+='DECAY BY MARKET:\n';
    Object.keys(mktGroups).forEach(function(mkt){
      var mktPages=mktGroups[mkt];
      prompt+='\n['+mkt+'] '+mktPages.length+' pages decaying:\n';
      prompt+=mktPages.slice(0,8).map(function(p){
        return'  '+p.key+' | clicks:'+p.prev+'\u2192'+p.curr+' (-'+p.pct+'%) | pos:'+p.posDrop+' | impr:-'+p.imprPct+'%';
      }).join('\n');
    });
  } else {
    prompt+='CRITICAL DECAY (>50% click drop):\n'
      +critical.map(function(p){return p.key+' | type:'+p.type+' | clicks:'+p.prev+'\u2192'+p.curr+' (-'+p.pct+'%) | pos change:+'+p.posDrop+' | impr:-'+p.imprPct+'%';}).join('\n');
    prompt+='\n\nHIGH DECAY (25-50% drop):\n'
      +high.map(function(p){return p.key+' | clicks:'+p.prev+'\u2192'+p.curr+' (-'+p.pct+'%) | pos:+'+p.posDrop;}).join('\n');
    if(medium.length)prompt+='\n\nMEDIUM DECAY:\n'+medium.map(function(p){return p.key+' -'+p.pct+'%';}).join(', ');
  }

  prompt+='\n\nFor each critical page identify the root cause: ranking drop, CTR issue, content freshness, or visibility loss.'
    +'\n\nReply with EXACTLY these sections:\n'
    +'## Decay Summary\n'
    +'## Critical Pages \u2014 Immediate Action\n- ['+(isAllMarkets?'market + ':'')+'page: root cause + specific fix]\n'
    +'## Pattern Analysis\n- [patterns '+(isAllMarkets?'per market':'for '+mktLabel)+']\n'
    +'## Recovery Priority Order\n1. ['+(isAllMarkets?'[market] ':'')+'page or group: action]\n2.\n3.\n4.\n5.\n'
    +'## What To Monitor';

  fetch(API_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1200,messages:[{role:'user',content:prompt}]})})
  .then(function(r){return r.json();})
  .then(function(d){
    S.decayReport=d.content&&d.content.length>0?d.content.map(function(c){return c.text||'';}).join(''):(d.error?'Error: '+JSON.stringify(d.error):'No response');
    if(btn){btn.disabled=false;btn.textContent='\uD83E\uDD16 Generate decay recovery plan';}
    tabDecay();
  })
  .catch(function(e){
    S.decayReport='Error: '+e.message;
    if(btn){btn.disabled=false;btn.textContent='\uD83E\uDD16 Generate decay recovery plan';}
    tabDecay();
  });
};

window.exportCSV=function(tableId,filename){
  var tbl=document.querySelector('#'+tableId+' table');
  if(!tbl){alert('No data to export yet');return;}
  var rows=Array.from(tbl.querySelectorAll('tr'));
  var csv=rows.map(function(row){
    return Array.from(row.querySelectorAll('th,td')).map(function(cell){
      var text=cell.innerText||cell.textContent||'';
      text=text.replace(/\n/g,' ').trim();
      // Wrap in quotes if contains comma, quote, or newline
      if(text.indexOf(',')>=0||text.indexOf('"')>=0)text='"'+text.replace(/"/g,'""')+'"';
      return text;
    }).join(',');
  }).join('\n');
  var mktKey=S.market||'all';
  var mktLabel=MARKETS[mktKey]?MARKETS[mktKey].label.replace(/\s+/g,'-').toLowerCase():mktKey;
  var fullName=(filename+'-'+mktLabel+'-'+new Date().toISOString().slice(0,10)+'.csv');
  var blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download=fullName;
  document.body.appendChild(a);a.click();
  document.body.removeChild(a);URL.revokeObjectURL(url);
};

var CWV_THRESHOLDS={
  lcp:  {good:2500, poor:4000,  unit:'ms',  label:'LCP',  name:'Largest Contentful Paint'},
  cls:  {good:0.1,  poor:0.25,  unit:'',    label:'CLS',  name:'Cumulative Layout Shift'},
  inp:  {good:200,  poor:500,   unit:'ms',  label:'INP',  name:'Interaction to Next Paint'},
  fcp:  {good:1800, poor:3000,  unit:'ms',  label:'FCP',  name:'First Contentful Paint'},
  ttfb: {good:800,  poor:1800,  unit:'ms',  label:'TTFB', name:'Time to First Byte'}
};

function cwvStatus(metric, val){
  var t=CWV_THRESHOLDS[metric];
  if(!t||val==null)return'unknown';
  return val<=t.good?'good':val<=t.poor?'needs-improvement':'poor';
}

function cwvColor(status){
  return status==='good'?'#27AE60':status==='needs-improvement'?'#D4882A':'#E05C3A';
}

function cwvBadge(metric, val){
  if(val==null)return'<span style="color:#444;font-size:10px">\u2014</span>';
  var t=CWV_THRESHOLDS[metric];
  var status=cwvStatus(metric,val);
  var col=cwvColor(status);
  var display=t.unit==='ms'?(val>=1000?(val/1000).toFixed(1)+'s':Math.round(val)+'ms'):val.toFixed(3);
  return'<span style="color:'+col+';font-weight:700;font-size:11px">'+display+'</span>';
}

function cwvScoreBadge(score){
  if(score==null)return'<span style="color:#444">\u2014</span>';
  var pct=Math.round(score*100);
  var col=pct>=90?'#27AE60':pct>=50?'#D4882A':'#E05C3A';
  return'<span style="background:'+col+';color:#fff;border-radius:50%;width:32px;height:32px;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700">'+pct+'</span>';
}

        +'<td class="r" style="color:#888">'+fmt(clicks)+(d&&d.fieldDataSource?'<div style="font-size:8px;color:#444">'+(d.fieldDataSource==='origin'?'origin avg':'page data')+'</div>':'')+'</td>'

    html+='</tbody></table></div>';
    html+='<div style="text-align:right;margin-top:8px">'+csvBtn('cwvTbl','core-web-vitals')+'</div>';

    html+=Object.entries(CWV_THRESHOLDS).map(function(e){
      var k=e[0],t=e[1];
      var g2=t.unit==='ms'?(t.good>=1000?t.good/1000+'s':t.good+'ms'):t.good;
      var p2=t.unit==='ms'?(t.poor>=1000?t.poor/1000+'s':t.poor+'ms'):t.poor;
      return'<span style="margin-right:14px"><strong style="color:#aaa">'+t.label+'</strong> \u2264'+g2+' good, >'+p2+' poor</span>';
    }).join('');
    html+='</div>';
  }

  if(!rows.length&&!S.cwvRunning){
    // Empty state
    html+='<div style="background:var(--bg2);border:1px solid #222;border-radius:11px;padding:40px 20px;text-align:center">';
    html+='<div style="font-size:36px;margin-bottom:10px">\u26a1</div>';
    html+='<div style="font-size:13px;color:#888;margin-bottom:6px">No CWV data yet for '+esc(mktLabel)+'</div>';
    html+='<div style="font-size:11px;color:#555;line-height:1.7;margin-bottom:16px">Click <strong style="color:#F0F0F0">Check pages</strong> to run PageSpeed Insights on your top pages for this market.</div>';
    html+='<div style="font-size:10px;color:#444">Will check '+candidates.length+' pages \u00b7 ~'+(candidates.length*3)+'-'+(candidates.length*5)+'s</div>';

  }

  $('tc').innerHTML=html;

window.runCWVReport=function(){
  var btn=$('cwvReportBtn');
  if(btn){btn.disabled=true;btn.textContent='Generating\u2026';}

  var mktKey=S.market||'all';
  var mktLabel=MARKETS[mktKey]?MARKETS[mktKey].label:mktKey;
  var rows=Object.entries(S.cwvData);

  // Build data for prompt
  var allPages=rows.filter(function(e){return e[1]&&!e[1].error&&!e[1].loading;}).map(function(e){
    var url=e[0].replace('https://www.casinos.com','');
    var d=e[1];
    var lcpS=cwvStatus('lcp',d.lcp),clsS=cwvStatus('cls',d.cls),inpS=cwvStatus('inp',d.inp);
    var score=d.score!=null?Math.round(d.score*100):null;
    return{url:url,score:score,lcp:d.lcp,cls:d.cls,inp:d.inp,fcp:d.fcp,ttfb:d.ttfb,
      lcpS:lcpS,clsS:clsS,inpS:inpS,
      needsAttention:lcpS!=='good'||clsS!=='good'||inpS!=='good'};
  });

  var poor=allPages.filter(function(p){return p.lcpS==='poor'||p.clsS==='poor'||p.inpS==='poor';});
  var ni=allPages.filter(function(p){return(p.lcpS==='needs-improvement'||p.clsS==='needs-improvement'||p.inpS==='needs-improvement')&&p.lcpS!=='poor'&&p.clsS!=='poor'&&p.inpS!=='poor';});
  var good=allPages.filter(function(p){return!p.needsAttention;});

  function fmtMs(v){return v==null?'N/A':v>=1000?(v/1000).toFixed(1)+'s':Math.round(v)+'ms';}

  var prompt='You are a technical SEO expert. Analyse these Core Web Vitals results for casinos.com '+mktLabel+' pages and generate a concise actionable report.\n\n'
    +'STRATEGY: '+S.cwvStrategy.toUpperCase()+'\n'
    +'PAGES CHECKED: '+allPages.length+' | POOR: '+poor.length+' | NEEDS IMPROVEMENT: '+ni.length+' | GOOD: '+good.length+'\n\n'
    +(poor.length?'POOR PAGES (immediate action needed):\n'+poor.map(function(p){return p.url+' | Score:'+(p.score||'?')+'% | LCP:'+fmtMs(p.lcp)+' ('+p.lcpS+') | CLS:'+(p.cls!=null?p.cls.toFixed(3):'N/A')+' ('+p.clsS+') | INP:'+fmtMs(p.inp)+' ('+p.inpS+') | TTFB:'+fmtMs(p.ttfb);}).join('\n')+'\n\n':'')
    +(ni.length?'NEEDS IMPROVEMENT:\n'+ni.map(function(p){return p.url+' | Score:'+(p.score||'?')+'% | LCP:'+fmtMs(p.lcp)+' | CLS:'+(p.cls!=null?p.cls.toFixed(3):'N/A')+' | INP:'+fmtMs(p.inp)+' | TTFB:'+fmtMs(p.ttfb);}).join('\n')+'\n\n':'')
    +(good.length?'PASSING PAGES:\n'+good.map(function(p){return p.url+' ('+p.score+'%)';}).join(', ')+'\n\n':'')
    +'THRESHOLDS: LCP ≤2.5s good / CLS ≤0.1 good / INP ≤200ms good\n\n'
    +'Reply with EXACTLY these sections:\n'
    +'## CWV Summary\n'
    +'## Pages Needing Immediate Attention\n- [page: specific issue and fix]\n'
    +'## Common Issues\n- [pattern across pages]\n'
    +'## Quick Wins\n1. [action]\n2. [action]\n3. [action]\n'
    +'## What Is Passing';

  fetch(API_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:900,messages:[{role:'user',content:prompt}]})})
  .then(function(r){return r.json();})
  .then(function(d){
    S.cwvReport=d.content&&d.content.length>0?d.content.map(function(c){return c.text||'';}).join(''):(d.error?'Error: '+JSON.stringify(d.error):'No response');
    if(btn){btn.disabled=false;btn.textContent='\uD83E\uDD16 Generate CWV Report';}
    tabCWV();
  })
  .catch(function(e){
    if(btn){btn.disabled=false;btn.textContent='\uD83E\uDD16 Generate CWV Report';}
    S.cwvReport='Error: '+e.message;
    tabCWV();
  });
};

function _renderCWVReport(text){
  var ST={
    'CWV Summary':                    {bg:'rgba(39,174,96,.07)',  bc:'#27AE60',tc:'#2ECC71'},
    'Pages Needing Immediate Attention':{bg:'rgba(224,92,58,.07)', bc:'#E05C3A',tc:'#E8896A'},
    'Common Issues':                  {bg:'rgba(212,136,42,.07)', bc:'#D4882A',tc:'#F0A93C'},
    'Quick Wins':                     {bg:'rgba(233,30,140,.07)', bc:'#E91E8C',tc:'#F48FB1'},
    'What Is Passing':                {bg:'rgba(39,174,96,.07)',  bc:'#27AE60',tc:'#2ECC71'}
  };
  var secs=text.split(/^## /m).filter(Boolean);
  var html='<div style="margin-top:4px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">'
    +'<div style="font-size:10px;color:#555">CWV Analysis \u2014 powered by Claude</div>'
    +'<button onclick="S.cwvReport=null;tabCWV()" style="font-size:11px;padding:4px 10px">Clear report</button>'
    +'</div>';
  secs.forEach(function(sec){
    var parts=sec.split('\n'),title=parts[0].trim(),body=parts.slice(1).join('\n').trim();
    var st=ST[title]||{bg:'rgba(255,255,255,.03)',bc:'#333',tc:'#888'};
    html+='<div class="tab-box" style="background:'+st.bg+';border-left-color:'+st.bc+';margin-bottom:8px">'
      +'<div class="tab-h" style="color:'+st.bc+'">'+esc(title)+'</div>'
      +'<div class="tab-b" style="color:'+st.tc+'">'+esc(body)+'</div></div>';
  });
  return html+'</div>';
}

window.runCWV=function(){
  var g=S.gsc,mktKey=S.market||'all';
  if(!g)return;

  S.cwvRunning=true;
  S.cwvData={};
  tabCWV();

  var cwvPT=S.cwvPageType||'money';
  var candidates=g.pages.filter(function(p){
    if(!matchMarket(p.key,mktKey))return false;
    var t=getPageType(p.key);
    if(cwvPT==='money') return t==='bofu'||t==='state'||t==='casino';
    if(cwvPT==='bofu')  return t==='bofu';
    if(cwvPT==='state') return t==='state';
    if(cwvPT==='casino')return t==='casino';
    if(cwvPT==='news')  return t==='news';
    return true;
  }).sort(function(a,b){return b.lc-a.lc;}).slice(0,S.cwvLimit||20);

  var urls=candidates.map(function(p){
    var url=p.key;
    if(!url.startsWith('http'))url='https://www.casinos.com'+url;
    return url;
  });

  _checkCWVQueue(urls,0);
};

window.runCWVSingle=function(){
  var inp=$('cwvCustomUrl');
  if(!inp||!inp.value.trim())return;
  var url=inp.value.trim();
  if(!url.startsWith('http'))url='https://www.casinos.com'+url;
  S.cwvRunning=true;
  S.cwvData[url]={loading:true};
  tabCWV();
  _fetchCWV(url,function(){
    S.cwvRunning=false;
    tabCWV();
  });
};

function _checkCWVQueue(urls,idx){
  if(idx>=urls.length){
    S.cwvRunning=false;
    tabCWV();
    return;
  }
  var url=urls[idx];
  var prog=$('cwvProgress');
  if(prog)prog.textContent='Checking '+(idx+1)+' of '+urls.length+': '+url.replace('https://www.casinos.com','');
  S.cwvData[url]={loading:true};

  _fetchCWV(url,function(){
    tabCWV();
    // 1.2s delay between requests — avoid rate limiting without API key
    setTimeout(function(){_checkCWVQueue(urls,idx+1);},1200);
  });
}

function _fetchCWV(url,cb){
  var apiUrl='https://www.googleapis.com/pagespeedonline/v5/runPagespeed'
    +'?url='+encodeURIComponent(url)
    +'&strategy='+S.cwvStrategy
    +(S.cwvApiKey?'&key='+encodeURIComponent(S.cwvApiKey):'');
  // Note: no &category=performance filter — get full response

  fetch(apiUrl)
  .then(function(r){
    S.cwvData[url]={error:'Not accessible — likely bot/crawler protection on this page'};
    cb();return;
    return r.json();
  })
  .then(function(d){
    // Store full raw response for debugging
    S.cwvLastRaw=d;

    // Check for Google API error
    if(d.error){
      S.cwvData[url]={error:'Google API: '+d.error.code+' — '+d.error.message};
      cb();return;
    }

    var result={url:url,hasFieldData:false,rawKeys:Object.keys(d).join(',')};

    // 1. Page-level field data (CrUX)
    var lx=d.loadingExperience;
    if(lx&&lx.metrics&&lx.overall_category&&lx.overall_category!=='NONE'){
      var m=lx.metrics;
      if(m.LARGEST_CONTENTFUL_PAINT_MS)    result.lcp =m.LARGEST_CONTENTFUL_PAINT_MS.percentile;
      if(m.CUMULATIVE_LAYOUT_SHIFT_SCORE)  result.cls =(m.CUMULATIVE_LAYOUT_SHIFT_SCORE.percentile||0)/100;
      if(m.INTERACTION_TO_NEXT_PAINT)      result.inp =m.INTERACTION_TO_NEXT_PAINT.percentile;
      if(m.FIRST_CONTENTFUL_PAINT_MS)      result.fcp =m.FIRST_CONTENTFUL_PAINT_MS.percentile;
      if(m.EXPERIMENTAL_TIME_TO_FIRST_BYTE)result.ttfb=m.EXPERIMENTAL_TIME_TO_FIRST_BYTE.percentile;
      result.hasFieldData=true;
      result.fieldDataSource='page';
    }

    // 2. Origin-level field data (whole domain)
    if(!result.hasFieldData){
      var ox=d.originLoadingExperience;
      if(ox&&ox.metrics&&ox.overall_category&&ox.overall_category!=='NONE'){
        var om=ox.metrics;
        if(om.LARGEST_CONTENTFUL_PAINT_MS)    result.lcp =om.LARGEST_CONTENTFUL_PAINT_MS.percentile;
        if(om.CUMULATIVE_LAYOUT_SHIFT_SCORE)  result.cls =(om.CUMULATIVE_LAYOUT_SHIFT_SCORE.percentile||0)/100;
        if(om.INTERACTION_TO_NEXT_PAINT)      result.inp =om.INTERACTION_TO_NEXT_PAINT.percentile;
        if(om.FIRST_CONTENTFUL_PAINT_MS)      result.fcp =om.FIRST_CONTENTFUL_PAINT_MS.percentile;
        if(om.EXPERIMENTAL_TIME_TO_FIRST_BYTE)result.ttfb=om.EXPERIMENTAL_TIME_TO_FIRST_BYTE.percentile;
        result.hasFieldData=true;
        result.fieldDataSource='origin';
      }
    }

    // 3. Lighthouse lab data (synthetic run — always present)
    var lr=d.lighthouseResult;
    if(lr){
      var cats=lr.categories||{};
      var perf=cats.performance||cats['performance']||null;
      if(perf&&perf.score!=null)result.score=perf.score;

      var audits=lr.audits||{};
      if(result.lcp==null&&audits['largest-contentful-paint'])  result.lcp =audits['largest-contentful-paint'].numericValue||null;
      if(result.cls==null&&audits['cumulative-layout-shift'])   result.cls =audits['cumulative-layout-shift'].numericValue||null;
      if(result.inp==null&&audits['total-blocking-time'])       result.inp =audits['total-blocking-time'].numericValue||null;
      if(result.fcp==null&&audits['first-contentful-paint'])    result.fcp =audits['first-contentful-paint'].numericValue||null;
      if(result.ttfb==null&&audits['server-response-time'])     result.ttfb=audits['server-response-time'].numericValue||null;
      result.hasLighthouse=true;
    }

    // Show raw keys if still no data (debugging)
    if(result.score==null&&result.lcp==null&&result.fcp==null){

      S.cwvData[url]=result;
    }
    cb();
  })
  .catch(function(e){
    var msg=e.message||'';

                 msg.includes('404')?'Page not found (404)':
                 msg.includes('403')?'Access blocked (403)':
                 msg.includes('Failed to fetch')||msg.includes('NetworkError')?'Network error — check your connection':
                 'Request failed: '+msg;

    cb();
  });
}
